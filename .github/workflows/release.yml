name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          perl -0777 -i -pe "s/project\('vala-downloader-lib', 'vala', 'c', version: '[^']+'\)/project('vala-downloader-lib', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

          SYNCED_VERSION="$(sed -nE "s/^project\('vala-downloader-lib', 'vala', 'c', version: '([^']+)'\)/\1/p" meson.build)"
          if [ "${SYNCED_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version sync failed (${SYNCED_VERSION} != ${TAG_VERSION})"
            exit 1
          fi

          echo "meson.build now uses release version ${SYNCED_VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            pkg-config \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libgee-0.8-dev

      - name: Configure release build
        run: meson setup build-release --buildtype=release

      - name: Build release
        run: meson compile -C build-release

      - name: Run tests
        run: meson test -C build-release --print-errorlogs

      - name: Create release bundle
        run: |
          mkdir -p dist
          cp -a build-release/src/libvala-downloader-lib.so* dist/
          cp build-release/src/vapi/vala-downloader-lib.vapi dist/
          cp build-release/src/vala-downloader-lib.h dist/
          (cd dist && zip -r ../vala-downloader-lib-${GITHUB_REF_NAME}-linux.zip .)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vala-downloader-lib-linux
          if-no-files-found: warn
          path: |
            build-release/src/libvala-downloader-lib.so*
            build-release/src/vapi/vala-downloader-lib.vapi
            build-release/src/vala-downloader-lib.h
            vala-downloader-lib-${{ github.ref_name }}-linux.zip

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"
          if [ -n "${PREVIOUS_TAG}" ]; then
            RELEASE_RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RELEASE_RANGE="${CURRENT_TAG}"
          fi

          {
            echo
            echo "## Changes"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${RELEASE_RANGE}" || true
            else
              echo "Initial release changes:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${RELEASE_RANGE}" || true
            fi
            echo
            echo
            echo "## Contributors"
            echo

            CONTRIBUTOR_COUNT="$(git log --no-merges --format='%aN' "${RELEASE_RANGE}" | sed '/^$/d' | sort -u | wc -l | tr -d ' ')"
            if [ "${CONTRIBUTOR_COUNT}" = "0" ]; then
              echo "- _No contributors found in this release range._"
            else
              git log --no-merges --format='%aN' "${RELEASE_RANGE}" | sed '/^$/d' | sort -u | sed 's/^/- /'
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build-release/src/libvala-downloader-lib.so*
            build-release/src/vapi/vala-downloader-lib.vapi
            build-release/src/vala-downloader-lib.h
            vala-downloader-lib-${{ github.ref_name }}-linux.zip

      - name: Persist meson.build version to default branch
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          git checkout "${DEFAULT_BRANCH}"

          perl -0777 -i -pe "s/project\('vala-downloader-lib', 'vala', 'c', version: '[^']+'\)/project('vala-downloader-lib', 'vala', 'c', version: '${TAG_VERSION}')/" meson.build

          if git diff --quiet -- meson.build; then
            echo "No version commit needed on ${DEFAULT_BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meson.build
          git commit -m "chore(release): bump meson version to ${TAG_VERSION}"

          if ! git push origin "HEAD:${DEFAULT_BRANCH}"; then
            echo "::warning::Failed to push version bump commit to ${DEFAULT_BRANCH}."
            echo "::warning::Please push meson.build version update manually."
          fi
